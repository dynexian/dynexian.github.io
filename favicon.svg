<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
    <!-- Dark Background -->
    <rect width="512" height="512" rx="120" fill="#030308"/>
    
    <!-- Outer Glow / Ring -->
    <circle cx="256" cy="256" r="220" stroke="url(#paint0_linear)" stroke-width="12" opacity="0.3"/>
    
    <!-- Abstract 3D Geometric Shape (representing Fractal Fauna / Data) -->
    <path d="M256 120L360 180L360 300L256 360L152 300L152 180L256 120Z" fill="url(#paint1_linear)" opacity="0.1"/>
    <path d="M256 120L360 180L256 240L152 180L256 120Z" fill="url(#paint2_linear)" opacity="0.2"/>
    <path d="M256 240L360 180L360 300L256 360L256 240Z" fill="url(#paint3_linear)" opacity="0.3"/>
    <path d="M152 180L256 240L256 360L152 300L152 180Z" fill="url(#paint4_linear)" opacity="0.4"/>
    
    <!-- // Brackets Core Motif -->
    <text x="50%" y="60%" text-anchor="middle" font-family="'Fira Code', monospace" font-size="160" font-weight="bold" fill="#0ea5e9" letter-spacing="10">//</text>

    <!-- Gradients -->
    <defs>
        <linearGradient id="paint0_linear" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
            <stop stop-color="#0ea5e9"/>
            <stop offset="1" stop-color="#a855f7"/>
        </linearGradient>
        <linearGradient id="paint1_linear" x1="256" y1="120" x2="256" y2="360" gradientUnits="userSpaceOnUse">
            <stop stop-color="#a855f7"/>
            <stop offset="1" stop-color="#0ea5e9"/>
        </linearGradient>
        <linearGradient id="paint2_linear" x1="256" y1="120" x2="256" y2="240" gradientUnits="userSpaceOnUse">
            <stop stop-color="#0ea5e9"/>
            <stop offset="1" stop-color="#a855f7"/>
        </linearGradient>
        <linearGradient id="paint3_linear" x1="256" y1="180" x2="360" y2="360" gradientUnits="userSpaceOnUse">
            <stop stop-color="#a855f7"/>
            <stop offset="1" stop-color="#0ea5e9"/>
        </linearGradient>
        <linearGradient id="paint4_linear" x1="152" y1="180" x2="256" y2="360" gradientUnits="userSpaceOnUse">
            <stop stop-color="#0ea5e9"/>
            <stop offset="1" stop-color="#a855f7"/>
        </linearGradient>
    </defs>
</svg>
